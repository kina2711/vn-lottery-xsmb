name: Daily Lottery Update

on:
  schedule:
    - cron: "15 12 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Test
        run: python -m pytest
      - name: Run daily pipeline
        run: vn-lottery run-daily
      - name: Commit and Push README Update
        run: |
          git config --local user.email "183811251+kina2711@users.noreply.github.com"
          git config --local user.name "kina2711"
          git add README.md
          git commit -m "Auto-update latest technical signals in README" || exit 0
          git push
      - name: Commit changed data and docs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update lottery data and reports"
          file_pattern: "data/ docs/"
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy Pages
        uses: actions/deploy-pages@v4
